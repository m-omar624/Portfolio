<!-- EmailJS HTML template for portfolio contact form -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Contact</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; color:#111; line-height:1.45;">
    <div style="max-width:700px;margin:0 auto;padding:18px;">
      <h2 style="margin:0 0 8px 0; color:#4b2cff;">New message from your portfolio</h2>
      <p style="margin:0 0 12px 0;"><strong>From:</strong> {{from_name}} &lt;{{from_email}}&gt;</p>
      <hr style="border:none;border-top:1px solid #eee;margin:8px 0 16px 0" />
      <div style="white-space:pre-wrap; color:#222;">
        {{message}}
      </div>
      <hr style="border:none;border-top:1px solid #eee;margin:16px 0" />
      <p style="margin:0;font-size:13px;color:#666">This message was sent from your portfolio contact form.</p>
    </div>
  </body>
</html>
