<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gm" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7A2BFF"/>
      <stop offset="100%" stop-color="#8C64FF"/>
    </linearGradient>
  </defs>

  <!-- circle background -->
  <circle cx="32" cy="32" r="30" fill="url(#gm)" />

  <!-- initials MO -->
  <g fill="#FFFFFF" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="700" font-size="26" text-anchor="middle" dominant-baseline="central">
    <text x="22.5" y="34">M</text>
    <text x="42.5" y="34">O</text>
  </g>

  <!-- subtle inner stroke -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
</svg>
